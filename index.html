<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENTITY TERMINAL | Secure Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;600&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --void-black: #020202;
            --entity-core: #0a0a0c;
            --blood-crimson: #9b0000;
            --flesh-ash: #2a2a2c;
            --fog-silver: #c4c4c5;
            --text-pure: #ffffff;
            --auric-gold: #cfaa4b;
        }

        body {
            background-color: var(--void-black);
            color: var(--fog-silver);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3 { font-family: 'Cinzel', serif; color: var(--text-pure); text-transform: uppercase; }
        
        /* =======================================================
           LOGIN SCREEN STYLES
           ======================================================= */
        #login-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .login-box {
            background: var(--entity-core);
            border: 1px solid var(--blood-crimson);
            padding: 3rem;
            text-align: center;
            box-shadow: 0 0 30px rgba(155, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-box h2 {
            margin-top: 0;
            letter-spacing: 0.1em;
            color: var(--blood-crimson);
        }

        .login-box input {
            width: 100%;
            background: #111;
            border: 1px solid var(--flesh-ash);
            color: white;
            padding: 1rem;
            margin-bottom: 1rem;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }

        .login-box button {
            width: 100%;
            background: var(--blood-crimson);
            color: white;
            border: none;
            padding: 1rem;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 0.1em;
            transition: 0.3s;
        }

        .login-box button:hover {
            background: #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }

        /* =======================================================
           DASHBOARD STYLES (Hidden by default)
           ======================================================= */
        #admin-dashboard {
            display: none; /* Hidden until logged in */
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 2px solid var(--blood-crimson);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }

        .header-bar h1 { margin: 0; }

        .btn-logout {
            background: transparent;
            color: var(--fog-silver);
            border: 1px solid var(--flesh-ash);
            padding: 0.5rem 1.5rem;
            cursor: pointer;
            font-family: 'Rajdhani';
            font-weight: bold;
        }
        .btn-logout:hover { color: white; border-color: white; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 2rem; }
        @media (max-width: 900px) { .dashboard-grid { grid-template-columns: 1fr; } }

        .panel { background: var(--entity-core); border: 1px solid var(--flesh-ash); padding: 1.5rem; border-radius: 4px; }
        
        /* Player List */
        .player-list { list-style: none; padding: 0; margin: 1rem 0; max-height: 400px; overflow-y: auto; }
        .player-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; border-bottom: 1px solid var(--flesh-ash); font-family: 'Rajdhani', sans-serif; font-size: 1.2rem; }
        .btn-delete { background: var(--blood-crimson); color: white; border: none; padding: 0.5rem 1rem; cursor: pointer; font-family: 'Rajdhani'; font-weight: bold; }
        
        /* Add Player */
        .add-player-form { display: flex; gap: 1rem; margin-top: 1rem; }
        .add-player-form input { flex: 1; background: #111; border: 1px solid var(--flesh-ash); color: white; padding: 0.75rem; }
        .btn-add { background: var(--flesh-ash); color: white; border: 1px solid var(--fog-silver); padding: 0.75rem 1.5rem; cursor: pointer; }
        
        /* Matches */
        .match-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
        .match-card { background: #111; border: 1px solid var(--flesh-ash); padding: 1rem; }
        .match-card h3 { margin-top: 0; color: var(--auric-gold); font-size: 1.1rem; }
        .match-row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; align-items: center; }
        .match-row input { background: #000; border: 1px solid #333; color: white; padding: 0.5rem; }
        .match-row input[type="text"] { flex: 2; }
        .match-row input[type="number"] { flex: 1; text-align: center; }
        select { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 0.5rem; margin-top: 0.5rem; }
        
        .btn-save { background: transparent; border: 1px solid var(--auric-gold); color: var(--auric-gold); width: 100%; padding: 0.5rem; margin-top: 1rem; cursor: pointer; text-transform: uppercase; font-weight: bold; transition: 0.3s;}
        .btn-save:hover { background: var(--auric-gold); color: black; }

        .back-link { color: var(--fog-silver); text-decoration: none; font-family: 'Rajdhani'; font-size: 1.1rem; display: inline-block; margin-bottom: 1rem; }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← Return to Trial</a>

    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div class="login-box">
            <h2>Admin Authentication</h2>
            <p style="margin-bottom: 2rem; font-size: 0.9rem;">The Entity requires verification.</p>
            <input type="email" id="login-email" placeholder="Email Address">
            <input type="password" id="login-password" placeholder="Password">
            <button id="login-btn">ENTER REALM</button>
            <p id="login-error" style="color: var(--blood-crimson); margin-top: 1rem; display: none;"></p>
        </div>
    </div>

    <!-- ADMIN DASHBOARD -->
    <div id="admin-dashboard">
        <div class="header-bar">
            <h1>Entity Control Terminal</h1>
            <button id="logout-btn" class="btn-logout">DISCONNECT</button>
        </div>

        <div class="dashboard-grid">
            <!-- PLAYER MANAGEMENT -->
            <div class="panel">
                <h2>The Sacrifices</h2>
                <div class="add-player-form">
                    <input type="text" id="new-player-name" placeholder="Enter Survivor Name...">
                    <button id="add-player-btn" class="btn-add">ADD</button>
                </div>
                <ul class="player-list" id="admin-player-list"></ul>
            </div>

            <!-- MATCH MANAGEMENT -->
            <div class="panel">
                <h2>Blood Web Configuration</h2>
                <div class="match-grid" id="admin-match-grid"></div>
            </div>
        </div>
    </div>

    <!-- FIREBASE LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        // IMPORT AUTHENTICATION MODULES
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        // !!! PASTE YOUR EXACT FIREBASE CONFIG HERE !!!
        const firebaseConfig = {
            apiKey: "AIzaSyCvn_mTEQzb3YVptAnFluDuUYi8IVUx520",
            authDomain: "carnival-of-carnage.firebaseapp.com",
            projectId: "carnival-of-carnage",
            storageBucket: "carnival-of-carnage.firebasestorage.app",
            messagingSenderId: "637057918873",
            appId: "1:637057918873:web:f043f33ab95848e0331508",
            measurementId: "G-DR98DQMMGB"
            
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app); // Initialize Auth

        // UI Elements
        const loginScreen = document.getElementById('login-screen');
        const adminDashboard = document.getElementById('admin-dashboard');
        
        /* =========================================
           AUTHENTICATION LOGIC
           ========================================= */
        
        // Listen for Login State Changes
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is logged in! Hide login, show dashboard.
                loginScreen.style.display = 'none';
                adminDashboard.style.display = 'block';
                loadDashboardData(); // Start loading data from Firestore
            } else {
                // User is logged out. Show login, hide dashboard.
                loginScreen.style.display = 'flex';
                adminDashboard.style.display = 'none';
            }
        });

        // Handle Login Button Click
        document.getElementById('login-btn').addEventListener('click', () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            const errorText = document.getElementById('login-error');

            signInWithEmailAndPassword(auth, email, pass)
                .catch((error) => {
                    errorText.innerText = "Access Denied. Incorrect credentials.";
                    errorText.style.display = 'block';
                });
        });

        // Handle Logout Button Click
        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth);
        });


        /* =========================================
           DASHBOARD DATA LOGIC 
           (Only runs if user is logged in)
           ========================================= */
        function loadDashboardData() {
            // 1. PLAYER MANAGEMENT
            const playerListEl = document.getElementById('admin-player-list');
            const addPlayerBtn = document.getElementById('add-player-btn');
            const newPlayerInput = document.getElementById('new-player-name');

            onSnapshot(collection(db, "players"), (snapshot) => {
                playerListEl.innerHTML = '';
                snapshot.forEach(docSnap => {
                    const playerName = docSnap.id;
                    const li = document.createElement('li');
                    li.className = 'player-item';
                    li.innerHTML = `
                        <span>${playerName}</span>
                        <button class="btn-delete" data-name="${playerName}">X</button>
                    `;
                    playerListEl.appendChild(li);
                });

                document.querySelectorAll('.btn-delete').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const name = e.target.getAttribute('data-name');
                        if(confirm(`Sacrifice ${name} to the void?`)) {
                            await deleteDoc(doc(db, "players", name));
                        }
                    });
                });
            });

            addPlayerBtn.addEventListener('click', async () => {
                const name = newPlayerInput.value.trim();
                if (name === "") return;
                await setDoc(doc(db, "players", name), { name: name });
                newPlayerInput.value = ''; 
            });

            // 2. MATCH MANAGEMENT
            const matchGridEl = document.getElementById('admin-match-grid');

            onSnapshot(collection(db, "matches"), (snapshot) => {
                let matches = snapshot.docs.map(d => d.data());
                matches.sort((a, b) => parseInt(a.id.substring(1)) - parseInt(b.id.substring(1)));

                matchGridEl.innerHTML = '';

                matches.forEach(match => {
                    const card = document.createElement('div');
                    card.className = 'match-card';
                    card.innerHTML = `
                        <h3>Match ${match.id.substring(1)} (Round ${match.round})</h3>
                        <div class="match-row">
                            <input type="text" id="${match.id}-p1" value="${match.p1}" placeholder="Player 1">
                            <input type="number" id="${match.id}-s1" value="${match.s1}" placeholder="Score">
                        </div>
                        <div class="match-row">
                            <input type="text" id="${match.id}-p2" value="${match.p2}" placeholder="Player 2">
                            <input type="number" id="${match.id}-s2" value="${match.s2}" placeholder="Score">
                        </div>
                        <select id="${match.id}-state">
                            <option value="upcoming" ${match.state === 'upcoming' ? 'selected' : ''}>Upcoming (No Lines)</option>
                            <option value="pending" ${match.state === 'pending' ? 'selected' : ''}>Pending (Red Lines)</option>
                            <option value="complete" ${match.state === 'complete' ? 'selected' : ''}>Complete (Highlights Winner)</option>
                        </select>
                        <button class="btn-save" data-id="${match.id}">Update Match</button>
                    `;
                    matchGridEl.appendChild(card);
                });

                document.querySelectorAll('.btn-save').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const id = e.target.getAttribute('data-id');
                        const updatedData = {
                            p1: document.getElementById(`${id}-p1`).value,
                            p2: document.getElementById(`${id}-p2`).value,
                            s1: parseInt(document.getElementById(`${id}-s1`).value) || 0,
                            s2: parseInt(document.getElementById(`${id}-s2`).value) || 0,
                            state: document.getElementById(`${id}-state`).value
                        };
                        try {
                            await updateDoc(doc(db, "matches", id), updatedData);
                            const originalText = e.target.innerText;
                            e.target.innerText = "UPDATED!";
                            e.target.style.background = "var(--auric-gold)";
                            e.target.style.color = "black";
                            setTimeout(() => {
                                e.target.innerText = originalText;
                                e.target.style.background = "transparent";
                                e.target.style.color = "var(--auric-gold)";
                            }, 1000);
                        } catch (error) {
                            alert("Failed to update match. Check your console for errors.");
                        }
                    });
                });
            });
        }
    </script>
</body>
</html>
