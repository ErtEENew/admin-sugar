<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENTITY TERMINAL | Advanced Sandbox</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;600&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --void-black: #020202; --entity-core: #0a0a0c; --blood-crimson: #9b0000;
            --flesh-ash: #2a2a2c; --fog-silver: #c4c4c5; --text-pure: #ffffff; --auric-gold: #cfaa4b;
        }
        body { background-color: var(--void-black); color: var(--fog-silver); font-family: 'Inter', sans-serif; margin: 0; padding: 2rem; min-height: 100vh; display: flex; flex-direction: column; }
        h1, h2, h3, h4 { font-family: 'Cinzel', serif; color: var(--text-pure); text-transform: uppercase; }
        
        #login-screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .login-box { background: var(--entity-core); border: 1px solid var(--blood-crimson); padding: 3rem; text-align: center; max-width: 400px; width: 100%; box-shadow: 0 0 30px rgba(155, 0, 0, 0.2); }
        .login-box input { width: 100%; background: #111; border: 1px solid var(--flesh-ash); color: white; padding: 1rem; margin-bottom: 1rem; box-sizing: border-box; }
        .login-box button { width: 100%; background: var(--blood-crimson); color: white; border: none; padding: 1rem; font-family: 'Rajdhani'; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .login-box button:hover { background: #ff0000; }

        #admin-dashboard { display: none; }
        .header-bar { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid var(--blood-crimson); padding-bottom: 1rem; margin-bottom: 2rem; }
        .btn-logout { background: transparent; color: var(--fog-silver); border: 1px solid var(--flesh-ash); padding: 0.5rem 1.5rem; cursor: pointer; font-family: 'Rajdhani'; font-weight: bold; }
        
        .dashboard-grid { display: grid; grid-template-columns: 300px 1fr; gap: 2rem; }
        @media (max-width: 900px) { .dashboard-grid { grid-template-columns: 1fr; } }
        
        .panel { background: var(--entity-core); border: 1px solid var(--flesh-ash); padding: 1.5rem; }
        
        /* Players */
        .add-player-form { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .add-player-form input { flex: 1; background: #111; border: 1px solid var(--flesh-ash); color: white; padding: 0.5rem; }
        .btn-add { background: var(--flesh-ash); color: white; border: none; padding: 0.5rem 1rem; cursor: pointer; }
        .player-list { list-style: none; padding: 0; margin: 0; max-height: 400px; overflow-y: auto; }
        .player-item { display: flex; justify-content: space-between; padding: 0.5rem; border-bottom: 1px solid #1a1a1c; }
        .btn-delete { background: var(--blood-crimson); color: white; border: none; cursor: pointer; }

        /* Matches Sandbox */
        .sandbox-controls { display: flex; gap: 1rem; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--flesh-ash); }
        .btn-action { background: var(--blood-crimson); color: white; border: none; padding: 0.75rem 1.5rem; font-family: 'Rajdhani'; font-weight: bold; font-size: 1.1rem; cursor: pointer; letter-spacing: 0.05em; }
        .btn-action.outline { background: transparent; border: 1px solid var(--fog-silver); color: white; }
        
        .round-container { background: #0c0c0e; border: 1px solid #1a1a1c; padding: 1.5rem; margin-bottom: 2rem; }
        .round-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--flesh-ash); padding-bottom: 0.5rem; margin-bottom: 1.5rem; }
        .round-header h3 { margin: 0; color: var(--fog-silver); }
        
        .match-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        .match-card { background: #111; border: 1px solid #222; padding: 1rem; position: relative; }
        .match-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .match-card-header h4 { margin: 0; color: var(--auric-gold); }
        
        .match-row { background: #050505; border: 1px solid #1a1a1c; padding: 0.5rem; margin-bottom: 0.5rem; }
        .match-row label { display: block; font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.2rem; }
        .input-group { display: flex; gap: 0.5rem; }
        .input-group select { flex: 2; background: #111; border: 1px solid #333; color: white; padding: 0.4rem; font-family: 'Inter'; font-size: 0.85rem;}
        .input-group input[type="number"] { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 0.4rem; text-align: center; }
        
        .full-select { width: 100%; background: #111; border: 1px solid #333; color: white; padding: 0.5rem; margin-top: 0.5rem; font-family: 'Inter'; }
        .btn-update { width: 100%; background: transparent; border: 1px solid var(--auric-gold); color: var(--auric-gold); padding: 0.75rem; margin-top: 1rem; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-update:hover { background: var(--auric-gold); color: black; }
        .btn-delete-match { background: transparent; color: var(--blood-crimson); border: none; cursor: pointer; font-size: 0.8rem; text-decoration: underline; }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div class="login-box">
            <h2>Terminal Access</h2>
            <input type="email" id="login-email" placeholder="Email Address">
            <input type="password" id="login-password" placeholder="Password">
            <button id="login-btn">ENTER REALM</button>
            <p id="login-error" style="color: var(--blood-crimson); margin-top: 1rem; display: none;"></p>
        </div>
    </div>

    <!-- ADMIN DASHBOARD -->
    <div id="admin-dashboard">
        <div class="header-bar">
            <h1>Entity Match Sandbox</h1>
            <div>
                <a href="index.html" target="_blank" style="color: var(--fog-silver); margin-right: 1rem; font-family: 'Rajdhani';">Open Public View ↗</a>
                <button id="logout-btn" class="btn-logout">DISCONNECT</button>
            </div>
        </div>

        <div class="dashboard-grid">
            <!-- PLAYERS -->
            <div class="panel">
                <h2>Roster</h2>
                <div class="add-player-form">
                    <input type="text" id="new-player-name" placeholder="Survivor Name">
                    <button id="add-player-btn" class="btn-add">+</button>
                </div>
                <ul class="player-list" id="admin-player-list"></ul>
            </div>

            <!-- MATCHES -->
            <div class="panel">
                <h2>Dynamic Bracket Builder</h2>
                <div class="sandbox-controls">
                    <button id="add-round-btn" class="btn-action outline">+ ADD NEW ROUND</button>
                    <button id="wipe-bracket-btn" style="background: transparent; border: none; color: var(--blood-crimson); cursor: pointer; text-decoration: underline; margin-left: auto;">⚠ Wipe All Matches</button>
                </div>
                
                <div id="sandbox-container"></div>
            </div>
        </div>
    </div>

   <!-- FIREBASE LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, updateDoc, writeBatch, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        // !!! PASTE YOUR EXACT FIREBASE CONFIG HERE !!!
        const firebaseConfig = {
           // YOUR FIREBASE DETAILS HERE
            apiKey: "AIzaSyCvn_mTEQzb3YVptAnFluDuUYi8IVUx520",
            authDomain: "carnival-of-carnage.firebaseapp.com",
            projectId: "carnival-of-carnage",
            storageBucket: "carnival-of-carnage.firebasestorage.app",
            messagingSenderId: "637057918873",
            appId: "1:637057918873:web:f043f33ab95848e0331508",
            measurementId: "G-DR98DQMMGB"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app); 

        window.players = ["TBD", "BYE"]; 
        window.matches = [];

        // Auth
        onAuthStateChanged(auth, (user) => {
            if (user) { document.getElementById('login-screen').style.display = 'none'; document.getElementById('admin-dashboard').style.display = 'block'; loadData(); } 
            else { document.getElementById('login-screen').style.display = 'flex'; document.getElementById('admin-dashboard').style.display = 'none'; }
        });
        document.getElementById('login-btn').addEventListener('click', () => signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-password').value).catch(() => document.getElementById('login-error').style.display = 'block'));
        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        function loadData() {
            // Players
            onSnapshot(collection(db, "players"), (snapshot) => {
                window.players = ["TBD", "BYE"];
                const list = document.getElementById('admin-player-list');
                list.innerHTML = '';
                snapshot.forEach(d => {
                    window.players.push(d.id);
                    list.innerHTML += `<li class="player-item"><span>${d.id}</span> <button class="btn-delete" data-name="${d.id}">X</button></li>`;
                });
                document.querySelectorAll('.btn-delete').forEach(b => b.addEventListener('click', async (e) => await deleteDoc(doc(db, "players", e.target.dataset.name))));
                renderSandbox();
            });

            document.getElementById('add-player-btn').addEventListener('click', async () => {
                const name = document.getElementById('new-player-name').value.trim();
                if(name) { await setDoc(doc(db, "players", name), {name}); document.getElementById('new-player-name').value = ''; }
            });

            // Matches
            onSnapshot(collection(db, "matches"), (snapshot) => {
                window.matches = snapshot.docs.map(d => d.data());
                renderSandbox();
            });
        }

        // SANDBOX RENDERER
        function renderSandbox() {
            const container = document.getElementById('sandbox-container');
            container.innerHTML = '';
            
            if(!window.matches.length) {
                container.innerHTML = '<p style="color: #666;">No matches exist. Add a round to begin building.</p>';
                return;
            }

            const maxRound = Math.max(...window.matches.map(m => m.round));
            
            for(let r = 1; r <= maxRound; r++) {
                const roundMatches = window.matches.filter(m => m.round === r).sort((a,b) => parseInt(a.id.substring(1)) - parseInt(b.id.substring(1)));
                
                // --- DYNAMIC FILTERING: Find eligible players for this round ---
                let eligiblePlayers = ["TBD", "BYE"];
                if (r === 1) {
                    eligiblePlayers = [...window.players]; // Round 1: Show Everyone
                } else {
                    // Round 2+: Extract ONLY the winners of the previous round
                    const prevMatches = window.matches.filter(m => m.round === r - 1 && m.state === 'complete');
                    prevMatches.forEach(m => {
                        let winner = null;
                        if (m.s1 > m.s2) winner = m.p1;
                        else if (m.s2 > m.s1) winner = m.p2;
                        else if (m.p2 === "BYE") winner = m.p1;
                        else if (m.p1 === "BYE") winner = m.p2;
                        
                        if (winner && winner !== "TBD" && winner !== "BYE") eligiblePlayers.push(winner);
                    });
                    eligiblePlayers = [...new Set(eligiblePlayers)]; // Remove duplicates
                }
                
                let html = `
                <div class="round-container">
                    <div class="round-header">
                        <h3>Round ${r}</h3>
                        <button class="btn-add-match btn-action" data-round="${r}">+ ADD MATCH TO R${r}</button>
                    </div>
                    <div class="match-grid">
                `;

                roundMatches.forEach(match => {
                    const isComplete = match.state === 'complete';
                    const pDisabled = isComplete ? 'disabled' : '';
                    
                    // Helper to build options (keeps current player visible even if bracket changed)
                    const buildOpts = (selected) => {
                        const opts = [...eligiblePlayers];
                        if (selected && !opts.includes(selected)) opts.push(selected);
                        return opts.map(p => `<option value="${p}" ${selected === p ? 'selected':''}>${p}</option>`).join('');
                    };

                    const p1Opts = buildOpts(match.p1);
                    const p2Opts = buildOpts(match.p2);
                    
                    let winnerHTML = '';
                    if (isComplete) {
                        let winner = "TBD";
                        if (match.s1 > match.s2) winner = match.p1;
                        else if (match.s2 > match.s1) winner = match.p2;
                        else if (match.p2 === "BYE") winner = match.p1;
                        else if (match.p1 === "BYE") winner = match.p2;
                        
                        if (winner !== "TBD") {
                            winnerHTML = `<div style="margin-top: 1rem; color: var(--auric-gold); font-family: 'Rajdhani'; font-size: 1.2rem; font-weight: bold; text-align: center; border-top: 1px solid #2a2a2c; padding-top: 0.5rem;">🏆 WINNER: ${winner}</div>`;
                        }
                    }
                    
                    html += `
                        <div class="match-card" style="${isComplete ? 'border-color: var(--auric-gold); box-shadow: 0 0 15px rgba(207,170,75,0.15);' : ''}">
                            <div class="match-card-header">
                                <h4>Match ${match.id.substring(1)}</h4>
                                <button class="btn-delete-match" data-id="${match.id}">Delete</button>
                            </div>
                            
                            <div class="match-row">
                                <label>Participant 1</label>
                                <div class="input-group">
                                    <select id="${match.id}-p1" ${pDisabled}>${p1Opts}</select>
                                    <input type="number" id="${match.id}-s1" value="${match.s1}" ${pDisabled}>
                                </div>
                            </div>

                            <div class="match-row">
                                <label>Participant 2</label>
                                <div class="input-group">
                                    <select id="${match.id}-p2" ${pDisabled}>${p2Opts}</select>
                                    <input type="number" id="${match.id}-s2" value="${match.s2}" ${pDisabled}>
                                </div>
                            </div>

                            ${winnerHTML}
                            
                            <button class="btn-update" data-id="${match.id}">${isComplete ? 'UNLOCK / EDIT MATCH' : 'SAVE MATCH'}</button>
                        </div>
                    `;
                });

                html += `</div></div>`;
                container.innerHTML += html;
            }

            // Attach Event Listeners
            document.querySelectorAll('.btn-add-match').forEach(b => b.addEventListener('click', createMatch));
            document.querySelectorAll('.btn-update').forEach(b => b.addEventListener('click', updateMatch));
            document.querySelectorAll('.btn-delete-match').forEach(b => b.addEventListener('click', deleteMatch));
        }

        // SANDBOX ACTIONS
        document.getElementById('add-round-btn').addEventListener('click', () => {
            const nextRound = window.matches.length ? Math.max(...window.matches.map(m => m.round)) + 1 : 1;
            createMatch({ target: { dataset: { round: nextRound } } });
        });

        async function createMatch(e) {
            const round = parseInt(e.target.dataset.round);
            const nextId = "m" + (window.matches.length ? Math.max(...window.matches.map(m => parseInt(m.id.substring(1)))) + 1 : 1);
            
            await setDoc(doc(db, "matches", nextId), {
                id: nextId, round: round,
                p1: "TBD", p1_source: "", s1: 0,
                p2: "TBD", p2_source: "", s2: 0,
                state: "upcoming"
            });
        }

        async function updateMatch(e) {
            const id = e.target.dataset.id;
            const match = window.matches.find(m => m.id === id);

            // If match is locked, clicking unlocks it (resets score so you can edit)
            if (match.state === 'complete' && e.target.innerText === "UNLOCK / EDIT MATCH") {
                await updateDoc(doc(db, "matches", id), { s1: 0, s2: 0, state: "pending" });
                return;
            }

            const p1 = document.getElementById(`${id}-p1`).value;
            const p2 = document.getElementById(`${id}-p2`).value;
            const s1 = parseInt(document.getElementById(`${id}-s1`).value) || 0;
            const s2 = parseInt(document.getElementById(`${id}-s2`).value) || 0;

            // --- AUTOMATE STATE ---
            let state = "upcoming";
            if (p1 !== "TBD" || p2 !== "TBD") state = "pending";
            // Complete if someone scores higher, OR someone has a BYE
            if (s1 > s2 || s2 > s1 || (p1 !== "TBD" && p2 === "BYE") || (p2 !== "TBD" && p1 === "BYE")) {
                state = "complete";
            }

            // --- AUTOMATE CONNECTIONS (BLOODLINES) ---
            const findSource = (playerName) => {
                if (!playerName || playerName === "TBD" || playerName === "BYE") return "";
                const prev = window.matches.find(m => {
                    if (m.round !== match.round - 1 || m.state !== 'complete') return false;
                    let winner = "TBD";
                    if (m.s1 > m.s2) winner = m.p1;
                    else if (m.s2 > m.s1) winner = m.p2;
                    else if (m.p2 === "BYE") winner = m.p1;
                    else if (m.p1 === "BYE") winner = m.p2;
                    return winner === playerName;
                });
                return prev ? prev.id : "";
            };

            const p1_source = findSource(p1);
            const p2_source = findSource(p2);

            await updateDoc(doc(db, "matches", id), {
                p1, p1_source, s1,
                p2, p2_source, s2,
                state
            });

            e.target.innerText = "SAVED!"; setTimeout(() => e.target.innerText = "SAVE MATCH", 1000);
        }

        async function deleteMatch(e) {
            if(confirm("Delete this match?")) await deleteDoc(doc(db, "matches", e.target.dataset.id));
        }

        document.getElementById('wipe-bracket-btn').addEventListener('click', async () => {
            if(!confirm("DANGER: This wipes every match permanently. Proceed?")) return;
            const batch = writeBatch(db);
            window.matches.forEach(m => batch.delete(doc(db, "matches", m.id)));
            await batch.commit();
        });
    </script>
</body>
</html>
